<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WuJin Calendar - 墨水屏日历</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255,255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 60px 80px;
      max-width: 800px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 20px;
    }
    .logo span {
      color: #0071e3;
    }
    .content {
      margin: 40px 0;
    }
    .btn {
      display: inline-block;
      padding: 18px 50px;
      background: #0071e3;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 18px;
      transition: all 0.3s;
    }
    .btn:hover {
      background: #0077ed;
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 113, 227, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">WuJin<span>Calendar</span></div>
    <div class="content">
      <h1>网站正在建设中</h1>
      <p>WuJin Calendar 智能墨水屏日历</p>
      <br>
      <a href="https://github.com/cjqwjbdx/cjqwjbdx.github.io" class="btn" target="_blank">查看源码</a>
    </div>
  </div>
</body>
</html>
